<!DOCTYPE html>
<html>

<head>

    <title>Goal Portal Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .login-card{
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            width: 500px;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.4);
        }

        h1{
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .form-control{
            background: #334155;
            border: none;
            color: white;
            height: 50px;
            margin-bottom: 20px;
        }

        .form-control:focus{
            background: #334155;
            color: white;
            box-shadow: none;
        }

        .form-control::placeholder{
            color: #cbd5e1;
        }

        .btn-login{
            background: #3b82f6;
            border: none;
            height: 50px;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-login:hover{
            background: #2563eb;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <h1>Goal Portal Login</h1>

        <form method="POST">

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username">

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Password">


            {% if error %}

            <div class="alert alert-danger text-center">
                {{ error }}
            </div>

            {% endif %}


            <button class="btn btn-login w-100 text-white">
                Login
            </button>

            <div class="text-center mt-3">

                <a href="#"
                   onclick="alert('Please contact administrator to reset password.')"
                   style="color:#93c5fd; text-decoration:none;">

                   Forgot Password?

                </a>

            </div>

        </form>

    </div>

</body>

</html>
